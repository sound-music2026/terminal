<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundMusic Terminal</title>
  <style>
    body {
      margin: 0;
      background: #020617;
      color: #22c55e;
      font-family: monospace;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.25;
    }

    .terminal {
      position: relative;
      z-index: 1;
      max-width: 850px;
      margin: 60px auto;
      background: rgba(0, 0, 0, 0.78);
      border: 1px solid #22c55e;
      border-radius: 14px;
      padding: 25px;
      box-shadow: 0 0 30px #22c55e55;
    }

    .title {
      color: #86efac;
      font-size: 22px;
      margin-bottom: 20px;
    }

    #output {
      white-space: pre-wrap;
      line-height: 1.6;
      min-height: 330px;
      font-size: 15px;
    }

    button {
      background: transparent;
      color: #22c55e;
      border: 1px solid #22c55e;
      padding: 12px 22px;
      border-radius: 10px;
      cursor: pointer;
      font-family: monospace;
      font-size: 15px;
    }

    button:hover {
      background: #22c55e;
      color: #020617;
    }

    .blink {
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="terminal">
  <div class="title">SOUNDMUSIC // CYBER TERMINAL</div>
  <div id="output">Press START to initialize system<span class="blink">_</span></div>
  <button onclick="startTerminal()">START</button>
</div>

<script>
  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const letters = "01SOUNDMUSIC";
  const fontSize = 16;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  function drawMatrix() {
    ctx.fillStyle = "rgba(2, 6, 23, 0.08)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#22c55e";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setInterval(drawMatrix, 45);

  const lines = [
    "[SYSTEM] Initializing SoundMusic terminal...",
    "[OK] Loading audio interface...",
    "[OK] Connecting secure visual layer...",
    "[SCAN] Searching music frequencies...",
    "[DATA] Bass level: 92%",
    "[DATA] Signal strength: maximum",
    "[OK] Neural rhythm engine online",
    "[ACCESS] Welcome to SoundMusic",
    "",
    ">>> SYSTEM READY"
  ];

  let started = false;

  function startTerminal() {
    if (started) return;
    started = true;

    const output = document.getElementById("output");
    output.innerHTML = "";

    let lineIndex = 0;
    let charIndex = 0;

    function typeLine() {
      if (lineIndex >= lines.length) {
        output.innerHTML += '<span class="blink">_</span>';
        return;
      }

      if (charIndex < lines[lineIndex].length) {
        output.innerHTML += lines[lineIndex][charIndex];
        charIndex++;
        setTimeout(typeLine, 25);
      } else {
        output.innerHTML += "\n";
        lineIndex++;
        charIndex = 0;
        setTimeout(typeLine, 350);
      }
    }

    typeLine();
  }
</script>

</body>
</html>
